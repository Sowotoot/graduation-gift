<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>A Message For You 🎙️</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #080a10;
      --rec-body: #1a1a2e;
      --screen-bg: #060c14;
      --green: #00d46a;
      --amber: #f5c842;
      --pink: #e07898;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body {
      width:100%; min-height:100dvh;
      background: radial-gradient(ellipse at 50% 40%, #0f0c20 0%, #080a10 70%);
      font-family:'Lato',sans-serif; color:white;
      overflow-x:hidden; overflow-y:auto; -webkit-overflow-scrolling:touch;
    }

    .back-btn {
      position:fixed; top:max(16px,env(safe-area-inset-top)); left:16px; z-index:200;
      background:rgba(0,0,0,0.6); border:1.5px solid rgba(255,255,255,0.2);
      color:white; font-size:14px; padding:10px 18px; border-radius:20px; cursor:pointer;
      backdrop-filter:blur(4px); display:flex; align-items:center; gap:6px;
      -webkit-user-select:none; user-select:none;
    }
    .back-btn:active { transform:scale(0.95); }

    /* Music button */
    #musicBtn {
      position:fixed; top:max(16px,env(safe-area-inset-top)); right:16px; z-index:200;
      background:rgba(0,0,0,0.6); border:1.5px solid rgba(255,255,255,0.2);
      color:white; font-size:16px; width:42px; height:42px;
      border-radius:50%; cursor:pointer;
      backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center;
      -webkit-user-select:none; user-select:none; transition:all 0.2s;
    }
    #musicBtn:active { transform:scale(0.92); }
    #musicBtn.muted { color:rgba(255,255,255,0.3); border-color:rgba(255,255,255,0.1); }

    /* PAGE */
    .page {
      display:flex; flex-direction:column; align-items:center;
      padding: max(80px,calc(70px + env(safe-area-inset-top))) 20px 60px;
      min-height:100dvh;
    }

    .page-title {
      font-family:'Dancing Script',cursive; font-size:32px;
      color:rgba(255,255,255,0.85); margin-bottom:8px; text-align:center;
    }
    .page-sub {
      font-size:13px; color:rgba(255,255,255,0.35);
      letter-spacing:1px; text-transform:uppercase; margin-bottom:40px;
    }

    /* RECORDER DEVICE */
    .recorder-device {
      width:min(300px,88vw);
      background:linear-gradient(160deg,#22223a 0%,#1a1a2e 50%,#14141e 100%);
      border-radius:18px;
      border:1px solid rgba(100,100,180,0.2);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.7),
        0 0 0 1px rgba(255,255,255,0.05),
        inset 0 1px 0 rgba(255,255,255,0.08);
      padding:20px;
      margin-bottom:32px;
      position:relative;
    }

    /* SCREEN */
    .rec-screen {
      background:var(--screen-bg);
      border-radius:10px;
      border:1px solid rgba(0,200,100,0.2);
      padding:12px;
      margin-bottom:16px;
      box-shadow:inset 0 2px 8px rgba(0,0,0,0.5), 0 0 20px rgba(0,200,100,0.05);
      position:relative; overflow:hidden;
    }
    .screen-scanline {
      position:absolute; inset:0;
      background:repeating-linear-gradient(
        0deg,transparent,transparent 2px,rgba(0,200,100,0.03) 2px,rgba(0,200,100,0.03) 4px
      );
      pointer-events:none;
    }

    /* WAVEFORM */
    .waveform-container {
      height:60px; display:flex; align-items:center;
      justify-content:center; gap:3px;
      padding:0 4px; margin-bottom:8px;
    }
    .wbar {
      width:4px; border-radius:2px;
      background:var(--green); opacity:0.7;
      transition:height 0.1s ease;
      box-shadow:0 0 4px rgba(0,212,106,0.4);
    }
    .wbar.active { opacity:1; box-shadow:0 0 8px rgba(0,212,106,0.6); }
    .wbar.played { background:rgba(0,212,106,0.35); opacity:1; }

    /* TIME */
    .time-row {
      display:flex; justify-content:space-between; align-items:center;
    }
    .time-current, .time-total {
      font-size:12px; font-family:monospace;
      color:rgba(0,212,106,0.8); letter-spacing:1px;
    }
    .label-voicemail {
      font-size:10px; color:rgba(0,212,106,0.5);
      letter-spacing:2px; text-transform:uppercase;
    }

    /* PROGRESS TRACK */
    .progress-track {
      height:3px; background:rgba(0,200,100,0.15);
      border-radius:2px; margin:10px 0;
      position:relative; cursor:pointer;
    }
    .progress-fill {
      height:100%; background:var(--green);
      border-radius:2px; width:0%; transition:width 0.1s linear;
      box-shadow:0 0 6px rgba(0,212,106,0.5);
    }
    .progress-thumb {
      position:absolute; top:50%; right:0;
      width:10px; height:10px; border-radius:50%;
      background:var(--green);
      transform:translate(50%,-50%);
      box-shadow:0 0 8px rgba(0,212,106,0.7);
    }

    /* CONTROLS */
    .controls {
      display:flex; align-items:center; justify-content:center;
      gap:16px; margin-top:4px;
    }
    .ctrl-btn {
      width:44px; height:44px; border-radius:50%;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      color:rgba(255,255,255,0.6); font-size:14px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all 0.2s;
      -webkit-user-select:none; user-select:none;
    }
    .ctrl-btn:active { transform:scale(0.9); background:rgba(255,255,255,0.1); }

    .play-btn-big {
      width:64px; height:64px; border-radius:50%;
      background:linear-gradient(135deg,#00d46a,#00a050);
      border:none; color:white; font-size:22px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 20px rgba(0,212,106,0.4);
      transition:all 0.2s;
      -webkit-user-select:none; user-select:none;
    }
    .play-btn-big:active { transform:scale(0.92); box-shadow:0 2px 10px rgba(0,212,106,0.3); }

    /* BOTTOM BUTTONS */
    .rec-bottom {
      display:flex; gap:10px; margin-top:14px;
    }
    .rec-indicator {
      flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
      padding:8px;
      background:rgba(255,50,50,0.08);
      border:1px solid rgba(255,50,50,0.15);
      border-radius:8px;
      font-size:11px; color:rgba(255,100,100,0.6);
      letter-spacing:1px;
    }
    .rec-dot { width:7px; height:7px; border-radius:50%; background:#cc3333; animation:recBlink 1.2s ease-in-out infinite; }
    @keyframes recBlink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    .vol-indicator {
      flex:1; display:flex; align-items:center; justify-content:center; gap:3px;
      padding:8px;
      background:rgba(0,200,100,0.05);
      border:1px solid rgba(0,200,100,0.1);
      border-radius:8px;
    }
    .vol-bar {
      width:3px; border-radius:1px;
      background:rgba(0,200,100,0.4);
      animation:volAnim ease-in-out infinite alternate;
    }
    .vol-bar:nth-child(1){height:6px;--d:0s;}
    .vol-bar:nth-child(2){height:10px;--d:0.1s;}
    .vol-bar:nth-child(3){height:14px;--d:0.2s;}
    .vol-bar:nth-child(4){height:10px;--d:0.15s;}
    .vol-bar:nth-child(5){height:6px;--d:0.05s;}
    @keyframes volAnim { from{transform:scaleY(0.4);} to{transform:scaleY(1);} }

    /* NO AUDIO NOTICE */
    .no-audio {
      background:rgba(245,200,66,0.08); border:1px solid rgba(245,200,66,0.2);
      border-radius:10px; padding:16px; text-align:center; margin-bottom:16px;
      font-size:13px; color:rgba(255,255,255,0.5); line-height:1.6;
    }
    .no-audio span { color:var(--amber); }

    /* MESSAGE BELOW */
    .voice-message {
      text-align:center; max-width:320px;
    }
    .voice-message p {
      font-size:15px; line-height:1.8;
      color:rgba(255,255,255,0.65); margin-bottom:12px;
    }
    .voice-message .heart { font-size:28px; color:var(--pink); animation:heartbeat 1.4s ease-in-out infinite; }
    @keyframes heartbeat { 0%,100%{transform:scale(1);} 14%{transform:scale(1.12);} 28%{transform:scale(1);} 42%{transform:scale(1.08);} }
  </style>
</head>
<body>
  <button class="back-btn" onclick="goBack()">← Back</button>
  <button id="musicBtn">♪</button>

  <div class="page">
    <h1 class="page-title">For You🎙️</h1>
    <p class="page-sub">Press play when you're ready</p>

    <!-- RECORDER DEVICE -->
    <div class="recorder-device" id="recorderDevice">
      <div class="rec-screen">
        <div class="screen-scanline"></div>
        <div class="waveform-container" id="waveform"></div>
        <div class="progress-track" id="progTrack" onclick="seekAudio(event)">
          <div class="progress-fill" id="progFill"></div>
          <div class="progress-thumb" id="progThumb"></div>
        </div>
        <div class="time-row">
          <span class="time-current" id="timeCurrent">0:00</span>
          <span class="label-voicemail">VOICEMAIL</span>
          <span class="time-total" id="timeTotal">0:00</span>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" onclick="skipAudio(-10)" title="Rewind 10s">⏪</button>
        <button class="play-btn-big" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="skipAudio(10)" title="Forward 10s">⏩</button>
      </div>

      <div class="rec-bottom">
        <div class="rec-indicator">
          <div class="rec-dot"></div>
          <span>REC</span>
        </div>
        <div class="vol-indicator">
          <div class="vol-bar"></div>
          <div class="vol-bar"></div>
          <div class="vol-bar"></div>
          <div class="vol-bar"></div>
          <div class="vol-bar"></div>
        </div>
      </div>
    </div>

    <!-- No audio placeholder notice -->
    <div class="no-audio" id="noAudioNotice" style="display:none">
      🎙️ Add your voice message to <span>assets/audio/this.m4a</span><br>
      to hear it play here
    </div>

    <div class="voice-message">
      <p>Listen closely. This one's for you. Some things are better felt than explained.</p>
      
      
    </div>
  </div>

  <!-- Voicemail audio -->
  <audio id="voiceAudio" preload="auto">
    <source src="../assets/audio/this.m4a" type="audio/mp4">
  </audio>

  <!-- Background music (shared with rest of the site) -->
  <audio id="bgMusic" loop preload="auto">
    <source src="../assets/audio/bg-music.mp3" type="audio/mpeg">
  </audio>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="../audio.js"></script>
  <script>
    // Init shared audio manager
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof AudioManager !== 'undefined') AudioManager.init();
    });

    function goBack() {
      if (window.parent && window.parent !== window) window.parent.postMessage('close-gift','*');
      else window.history.back();
    }

    const audio = document.getElementById('voiceAudio');
    const playBtn = document.getElementById('playBtn');
    const progFill = document.getElementById('progFill');
    const progThumb = document.getElementById('progThumb');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeTotal = document.getElementById('timeTotal');
    const waveform = document.getElementById('waveform');
    const noAudioNotice = document.getElementById('noAudioNotice');

    // Build waveform bars
    const BAR_COUNT = 36;
    const bars = [];
    for (let i = 0; i < BAR_COUNT; i++) {
      const b = document.createElement('div');
      b.className = 'wbar';
      const h = 10 + Math.sin(i * 0.7) * 14 + Math.random() * 18;
      b.style.height = h + 'px';
      waveform.appendChild(b);
      bars.push({ el: b, h });
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    audio.addEventListener('loadedmetadata', () => {
      timeTotal.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('error', () => {
      noAudioNotice.style.display = 'block';
    });

    audio.addEventListener('timeupdate', () => {
      const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      progFill.style.width = pct + '%';
      progThumb.style.left = pct + '%';
      timeCurrent.textContent = formatTime(audio.currentTime);

      // Update waveform played state
      const playedBars = Math.floor((pct / 100) * BAR_COUNT);
      bars.forEach((b, i) => {
        b.el.classList.toggle('played', i < playedBars);
        b.el.classList.toggle('active', i === playedBars);
      });
    });

    audio.addEventListener('ended', () => {
      playBtn.textContent = '▶';
      bars.forEach(b => { b.el.classList.remove('active', 'played'); });
      animateBars(false);
      // Resume background music when voicemail finishes
      if (typeof AudioManager !== 'undefined' && !AudioManager.isMuted && AudioManager.bgMusic) {
        AudioManager.bgMusic.play().catch(() => {});
      }
    });

    function resumeBgMusic() {
      if (typeof AudioManager !== 'undefined' && !AudioManager.isMuted && AudioManager.bgMusic) {
        AudioManager.bgMusic.play().catch(() => {});
      }
    }

    function pauseBgMusic() {
      if (typeof AudioManager !== 'undefined' && AudioManager.bgMusic) {
        AudioManager.bgMusic.pause();
      }
    }

    function togglePlay() {
      if (audio.paused) {
        // Pause background music so only the voicemail is heard
        pauseBgMusic();
        audio.play().then(() => {
          playBtn.textContent = '⏸';
          animateBars(true);
        }).catch(() => {
          noAudioNotice.style.display = 'block';
        });
      } else {
        audio.pause();
        playBtn.textContent = '▶';
        animateBars(false);
        // Resume background music when voicemail is paused
        resumeBgMusic();
      }
    }

    function seekAudio(e) {
      const rect = document.getElementById('progTrack').getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      if (audio.duration) audio.currentTime = pct * audio.duration;
    }

    function skipAudio(sec) {
      audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
    }

    let barAnim;
    function animateBars(playing) {
      clearInterval(barAnim);
      if (!playing) return;
      barAnim = setInterval(() => {
        bars.forEach((b, i) => {
          const newH = 10 + Math.sin(i * 0.7 + Date.now() * 0.003) * 14 + Math.random() * 10;
          b.el.style.height = newH + 'px';
        });
      }, 100);
    }

    // Entrance animation
    gsap.from('#recorderDevice', { y: 40, opacity: 0, scale: 0.9, duration: 1, ease: 'back.out(1.5)', delay: 0.3 });
    gsap.from('.voice-message', { y: 20, opacity: 0, duration: 0.8, delay: 0.8 });
  </script>
</body>
</html>
