<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Memories</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Special+Elite&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --warm-dark: #080608;
      --amber: #c8933a;
      --cream: #f2e8d0;
      --sepia: #a0845c;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      width:100%; height:100dvh;
      background: var(--warm-dark);
      font-family:'Special Elite', serif;
      color: var(--cream);
      overflow:hidden;
      -webkit-font-smoothing:antialiased;
    }

    /* ── CINEMATIC BACKGROUND ── */
    #scene-bg {
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(80,30,100,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 80%, rgba(120,60,20,0.20) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(30,10,50,0.60) 0%, transparent 80%),
        #0a0608;
    }

    /* Horizontal scan lines */
    #scanlines {
      position:fixed; inset:0; z-index:1; pointer-events:none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
    }

    /* Film grain */
    #grain {
      position:fixed; inset:0; z-index:2; pointer-events:none; opacity:0.07;
    }

    /* Dust particles */
    #dust { position:fixed; inset:0; z-index:3; pointer-events:none; overflow:hidden; }
    .particle {
      position:absolute; width:2px; height:2px;
      background:rgba(200,170,100,0.5); border-radius:50%;
      animation:floatDust linear infinite;
    }
    @keyframes floatDust {
      0%   { transform:translateY(100vh) translateX(0); opacity:0; }
      10%  { opacity:1; }
      90%  { opacity:0.5; }
      100% { transform:translateY(-20px) translateX(30px); opacity:0; }
    }

    /* ── BACK BUTTON ── */
    .back-btn {
      position:fixed;
      top:max(14px,env(safe-area-inset-top)); left:16px; z-index:50;
      background:rgba(10,6,8,0.75);
      border:1px solid rgba(200,147,58,0.3);
      color:rgba(200,147,58,0.85);
      font-family:'Special Elite',serif; font-size:12px;
      padding:8px 18px; border-radius:2px;
      cursor:pointer; letter-spacing:2px; text-transform:uppercase;
      backdrop-filter:blur(6px);
      transition: border-color 0.2s, color 0.2s;
    }
    .back-btn:active { transform:scale(0.95); }

    /* ── FILM COUNTER (top right) ── */
    .film-counter {
      position:fixed;
      top:max(14px,env(safe-area-inset-top)); right:16px; z-index:50;
      font-family:'Bebas Neue', sans-serif;
      font-size:22px; letter-spacing:3px;
      color:rgba(200,147,58,0.5);
      text-shadow: 0 0 12px rgba(200,147,58,0.3);
    }

    /* ── MAIN LAYOUT ── */
    .viewer {
      display:flex; flex-direction:column;
      height:100dvh;
      padding-top:max(56px,calc(48px + env(safe-area-inset-top)));
      padding-bottom:max(10px,env(safe-area-inset-bottom));
      position:relative; z-index:10;
      gap:0;
    }

    /* ── STAGE ── */
    .stage {
      flex:1 1 0;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden; position:relative;
    }

    /* ── POLAROID CARD ── */
    .photo-card {
      position:absolute;
      left:50%; top:50%;
      transform:translate(-50%,-50%) rotate(var(--rot,0deg));
      /* Bigger: fill more of the screen */
      width:min(88vw,340px);
      background:#e8dcc0;
      padding:10px 10px 52px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.6),
        0 4px 8px rgba(0,0,0,0.7),
        0 16px 48px rgba(0,0,0,0.8),
        0 32px 80px rgba(0,0,0,0.5);
      transform-origin:center center;
      will-change:transform, opacity;
      z-index:2;
      /* Aged paper texture via CSS */
      background-image:
        radial-gradient(ellipse at 0% 0%, rgba(180,140,80,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(160,120,60,0.20) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 0%, rgba(200,180,120,0.10) 0%, transparent 40%);
    }

    /* Polaroid top edge sprocket holes decoration */
    .photo-card::before {
      content:'';
      position:absolute; top:0; left:0; right:0; height:6px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 12px,
        rgba(0,0,0,0.08) 12px, rgba(0,0,0,0.08) 18px,
        transparent 18px, transparent 30px
      );
      pointer-events:none;
    }

    /* Corner aging */
    .photo-card::after {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(ellipse at 0% 0%,    rgba(0,0,0,0.22) 0%, transparent 35%),
        radial-gradient(ellipse at 100% 0%,   rgba(0,0,0,0.14) 0%, transparent 28%),
        radial-gradient(ellipse at 0% 100%,   rgba(0,0,0,0.18) 0%, transparent 32%),
        radial-gradient(ellipse at 100% 100%, rgba(0,0,0,0.20) 0%, transparent 35%);
      pointer-events:none; z-index:4; border-radius:inherit;
    }

    /* ── PHOTO FRAME (image area) ── */
    .photo-frame {
      width:100%;
      padding-top:100%;
      position:relative; overflow:hidden;
      background:#1a1008;
      /* Film rebate border */
      outline:2px solid rgba(0,0,0,0.5);
      outline-offset:-2px;
    }

    .photo-frame img {
      position:absolute; inset:0;
      width:100%; height:100%; object-fit:cover; display:block;
      /* Cinematic color grade: teal shadows, warm mids */
      filter:
        sepia(0.30)
        contrast(1.12)
        brightness(0.88)
        saturate(0.80)
        hue-rotate(-5deg);
    }

    /* Vignette */
    .photo-frame::after {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse at center,
        transparent 40%,
        rgba(0,0,0,0.45) 75%,
        rgba(0,0,0,0.75) 100%);
      pointer-events:none; z-index:2;
    }

    /* Light leak top-left */
    .photo-frame::before {
      content:''; position:absolute;
      top:-10%; left:-5%; width:50%; height:45%;
      background:radial-gradient(ellipse at 20% 10%,
        rgba(255,180,60,0.12) 0%,
        transparent 65%);
      pointer-events:none; z-index:3;
    }

    /* Cinematic color overlay on image */
    .photo-grade {
      position:absolute; inset:0; z-index:1; pointer-events:none;
      /* Teal-shadow / warm-highlight grade */
      background:
        radial-gradient(ellipse at 0% 100%,   rgba(20,60,80,0.18)  0%, transparent 55%),
        radial-gradient(ellipse at 100% 100%, rgba(10,40,60,0.15)  0%, transparent 50%),
        radial-gradient(ellipse at 50% 0%,    rgba(120,80,20,0.10) 0%, transparent 50%);
      mix-blend-mode: multiply;
    }

    /* Placeholder when image missing */
    .ph-wrap {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:8px;
      background: linear-gradient(135deg, #1a1008 0%, #0e0a06 100%);
    }
    .ph-wrap span { font-size:38px; opacity:0.15; }
    .ph-wrap small {
      font-size:9px; color:rgba(160,130,90,0.25);
      letter-spacing:3px; text-transform:uppercase;
    }

    /* ── CAPTION AREA ── */
    .card-caption {
      padding-top:10px;
      text-align:center;
      position:relative; z-index:5;
    }
    .card-caption h2 {
      font-family:'Dancing Script',cursive;
      font-size:21px; font-weight:700;
      color:#2a1e0e;
      line-height:1.2;
      text-shadow: 0 1px 0 rgba(255,255,255,0.3);
    }
    .card-caption p {
      font-family:'Bebas Neue', sans-serif;
      font-size:10px; color:#7a5a30;
      letter-spacing:3px; margin-top:4px; text-transform:uppercase;
    }

    /* ── DATE STAMP (bottom-right of photo) ── */
    .date-stamp {
      position:absolute;
      bottom:10px; right:10px; z-index:5;
      font-family:'Bebas Neue', sans-serif;
      font-size:13px; letter-spacing:2px;
      color:rgba(255,140,40,0.85);
      text-shadow:
        0 0 8px rgba(255,120,20,0.7),
        0 0 20px rgba(255,100,10,0.4);
      pointer-events:none;
    }

    /* ── CARD ANIMATIONS ── */
    @keyframes cardEnter {
      0%   { opacity:0; transform:translate(-50%, calc(-50% - 50px)) rotate(var(--rot,0deg)) scale(0.90); }
      55%  { opacity:1; transform:translate(-50%, calc(-50% + 7px))  rotate(var(--rot,0deg)) scale(1.01); }
      78%  { transform:translate(-50%, calc(-50% - 3px)) rotate(var(--rot,0deg)) scale(1); }
      100% { opacity:1; transform:translate(-50%,-50%) rotate(var(--rot,0deg)) scale(1); }
    }
    @keyframes cardExitLeft {
      0%   { opacity:1; transform:translate(-50%,-50%) scale(1); }
      100% { opacity:0; transform:translate(calc(-50% + 115%), -50%) scale(0.90); }
    }
    @keyframes cardExitRight {
      0%   { opacity:1; transform:translate(-50%,-50%) scale(1); }
      100% { opacity:0; transform:translate(calc(-50% - 115%), -50%) scale(0.90); }
    }
    .card-entering   { animation:cardEnter     0.72s cubic-bezier(0.22,1,0.36,1) forwards; }
    .card-exit-left  { animation:cardExitLeft  0.46s cubic-bezier(0.4,0,0.8,0.6) forwards; }
    .card-exit-right { animation:cardExitRight 0.46s cubic-bezier(0.4,0,0.8,0.6) forwards; }

    /* ── SWIPE HINT ── */
    .swipe-hint {
      text-align:center; padding:5px 0 3px;
      font-family:'Bebas Neue', sans-serif;
      font-size:11px; color:rgba(160,130,60,0.28);
      letter-spacing:4px; text-transform:uppercase;
      flex:0 0 auto;
    }

    /* ── FILM STRIP ── */
    .filmstrip-wrap {
      flex:0 0 auto; padding:6px 0 2px; position:relative;
    }
    .filmstrip-wrap::before,
    .filmstrip-wrap::after {
      content:''; position:absolute; left:0; right:0; height:8px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 8px,
        rgba(200,147,58,0.22) 8px, rgba(200,147,58,0.22) 14px,
        transparent 14px, transparent 22px
      );
      pointer-events:none; z-index:2;
    }
    .filmstrip-wrap::before { top:0px; }
    .filmstrip-wrap::after  { bottom:0px; }

    .filmstrip {
      display:flex; gap:4px; padding:10px 16px;
      overflow-x:auto; overflow-y:hidden;
      -webkit-overflow-scrolling:touch; scrollbar-width:none;
      background:#050305;
      border-top:2px solid #1a1008; border-bottom:2px solid #1a1008;
    }
    .filmstrip::-webkit-scrollbar { display:none; }

    .film-frame {
      flex:0 0 54px; height:54px;
      position:relative; cursor:pointer;
      border:1.5px solid transparent; border-radius:1px;
      overflow:hidden; background:#0e0a06;
      transition:border-color 0.2s, transform 0.2s;
      -webkit-user-select:none;
    }
    .film-frame img {
      width:100%; height:100%; object-fit:cover; display:block;
      filter:sepia(0.5) contrast(0.85) brightness(0.65) saturate(0.6);
      transition:filter 0.2s;
    }
    .film-frame.active {
      border-color:rgba(200,147,58,0.9);
      transform:scale(1.1);
      box-shadow: 0 0 10px rgba(200,147,58,0.35);
    }
    .film-frame.active img {
      filter:sepia(0.2) contrast(1.05) brightness(0.90) saturate(0.85);
    }
    .film-frame:active { transform:scale(0.92) !important; }
    .film-frame::after {
      content:attr(data-num);
      position:absolute; bottom:2px; right:3px;
      font-size:8px; color:rgba(200,147,58,0.45);
      font-family:'Bebas Neue',sans-serif; letter-spacing:1px;
      pointer-events:none;
    }
    .film-placeholder {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
      background:#0a0806; font-size:16px; opacity:0.18;
    }

    /* ── NAVIGATION ARROWS ── */
    .nav-arrows {
      position:absolute; top:50%; left:0; right:0;
      display:flex; justify-content:space-between;
      padding:0 10px; pointer-events:none; z-index:20;
      transform:translateY(-50%);
    }
    .nav-arrow {
      width:36px; height:36px;
      border-radius:50%;
      background:rgba(10,6,8,0.6);
      border:1px solid rgba(200,147,58,0.25);
      color:rgba(200,147,58,0.6);
      font-size:16px; display:flex; align-items:center; justify-content:center;
      cursor:pointer; pointer-events:all;
      backdrop-filter:blur(4px);
      transition:background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color:transparent;
    }
    .nav-arrow:active {
      background:rgba(200,147,58,0.15);
      border-color:rgba(200,147,58,0.6);
      transform:scale(0.92);
    }
  </style>
</head>
<body>

<div id="scene-bg"></div>
<div id="scanlines"></div>
<canvas id="grain"></canvas>
<div id="dust"></div>

<button class="back-btn" onclick="goBack()">← Back</button>
<div class="film-counter" id="filmCounter">01 / 06</div>

<div class="viewer">
  <div class="stage" id="stage">
    <div class="nav-arrows">
      <button class="nav-arrow" id="prevBtn">&#8592;</button>
      <button class="nav-arrow" id="nextBtn">&#8594;</button>
    </div>
  </div>
  <div class="swipe-hint">&#8592; &nbsp; swipe to remember &nbsp; &#8594;</div>
  <div class="filmstrip-wrap">
    <div class="filmstrip" id="filmstrip"></div>
  </div>
</div>

<script>
  function goBack() {
    if (window.parent && window.parent !== window) window.parent.postMessage('close-gift','*');
    else window.history.back();
  }

  /* ============================================================
     📸 YOUR PHOTOS — update src, caption, date
  ============================================================ */
  const photos = [
    { src:'../assets/images/photo-1.jpg', caption:'Best memories',   date:'CLASS OF 2026' },
    { src:'../assets/images/photo-2.jpg', caption:'Together always', date:'ALWAYS & FOREVER' },
    { src:'../assets/images/photo-3.jpg', caption:'You made it!',    date:'GRADUATION DAY' },
    { src:'../assets/images/photo-4.jpg', caption:'So proud of you', date:'JUNE 2026' },
    { src:'../assets/images/photo-5.jpg', caption:'Unforgettable',   date:'YOUR STORY' },
    { src:'../assets/images/photo-6.jpg', caption:'Dream big',       date:'THE FUTURE AWAITS' },
  ];

  /* Slight different rotations for each card */
  const rots = [0, 0, 0, 0, 0, 0, 0, 0];

  let current = 0;
  let busy    = false;
  const stage = document.getElementById('stage');
  const filmstrip = document.getElementById('filmstrip');
  const filmCounter = document.getElementById('filmCounter');

  function pad(n){ return String(n).padStart(2,'0'); }
  function updateCounter(){ filmCounter.textContent = pad(current+1) + ' / ' + pad(photos.length); }

  /* Build a polaroid card */
  function makeCard(idx) {
    const p   = photos[idx];
    const rot = rots[idx % rots.length];
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.style.setProperty('--rot', rot + 'deg');

    card.innerHTML = `
      <div class="photo-frame">
        <div class="ph-wrap"><span>📷</span><small>photo ${idx+1}</small></div>
        <div class="photo-grade"></div>
        <img src="" alt="${p.caption}" style="display:none">
        <div class="date-stamp">${p.date}</div>
      </div>
      <div class="card-caption">
        <h2>${p.caption}</h2>
        <p>${p.date}</p>
      </div>
    `;

    const img = card.querySelector('img');
    const ph  = card.querySelector('.ph-wrap');
    const tmp = new Image();
    tmp.onload  = () => { img.src = p.src; img.style.display='block'; ph.style.display='none'; };
    tmp.onerror = () => {};
    tmp.src = p.src;

    return card;
  }

  /* Place first card */
  let activeCard = makeCard(0);
  stage.appendChild(activeCard);
  updateCounter();

  /* Filmstrip highlight sync */
  function updateStrip() {
    document.querySelectorAll('.film-frame').forEach((f,i) =>
      f.classList.toggle('active', i === current)
    );
    const el = filmstrip.children[current];
    if (el) el.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
    updateCounter();
  }

  /* Transition */
  function navigate(dir) {
    if (busy) return;
    const next = current + dir;
    if (next < 0 || next >= photos.length) {
      const rot = rots[current % rots.length];
      activeCard.style.transition = 'transform 0.18s cubic-bezier(0.22,1,0.36,1)';
      activeCard.style.transform  = `translate(-50%,-50%) rotate(${rot}deg) translateX(${dir*16}px)`;
      setTimeout(() => {
        activeCard.style.transform = `translate(-50%,-50%) rotate(${rot}deg)`;
        setTimeout(() => { activeCard.style.transition = ''; }, 220);
      }, 150);
      return;
    }

    busy = true;
    current = next;

    const incoming = makeCard(next);
    incoming.style.opacity = '0';
    incoming.style.zIndex  = '1';
    stage.appendChild(incoming);

    const exitCls = dir === 1 ? 'card-exit-left' : 'card-exit-right';
    activeCard.style.zIndex = '3';
    activeCard.classList.add(exitCls);

    setTimeout(() => {
      incoming.style.zIndex = '2';
      incoming.classList.add('card-entering');
    }, 85);

    setTimeout(() => {
      activeCard.remove();
      incoming.classList.remove('card-entering');
      const rot = rots[next % rots.length];
      incoming.style.transform = `translate(-50%,-50%) rotate(${rot}deg)`;
      incoming.style.opacity   = '1';
      activeCard = incoming;
      busy       = false;
      updateStrip();
    }, 760);
  }

  /* Arrow buttons */
  document.getElementById('prevBtn').addEventListener('click', () => navigate(-1));
  document.getElementById('nextBtn').addEventListener('click', () => navigate(1));

  /* Filmstrip clicks */
  photos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'film-frame' + (i === 0 ? ' active' : '');
    div.setAttribute('data-num', pad(i+1));
    const img = document.createElement('img');
    img.src = p.src; img.alt = p.caption;
    img.onerror = () => {
      img.style.display = 'none';
      const ph = document.createElement('div');
      ph.className = 'film-placeholder'; ph.innerHTML = '📷';
      div.appendChild(ph);
    };
    div.appendChild(img);
    div.addEventListener('click', () => {
      if (i === current || busy) return;
      function step() {
        if (i === current || busy) return;
        navigate(i > current ? 1 : -1);
        setTimeout(() => { if (i !== current) step(); }, 790);
      }
      step();
    });
    filmstrip.appendChild(div);
  });

  /* Touch swipe with drag follow */
  let tx = 0, dragging = false;
  stage.addEventListener('touchstart', e => {
    if (busy) return;
    tx = e.touches[0].clientX; dragging = true;
    activeCard.style.transition = 'none';
  }, { passive:true });

  stage.addEventListener('touchmove', e => {
    if (!dragging || busy) return;
    const dx = e.touches[0].clientX - tx;
    const rot = rots[current % rots.length];
    activeCard.style.transform = `translate(calc(-50% + ${dx * 0.42}px), -50%) rotate(${rot + dx * 0.022}deg)`;
  }, { passive:true });

  stage.addEventListener('touchend', e => {
    if (!dragging) return; dragging = false;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - tx;
    if (Math.abs(dx) > 38) {
      navigate(dx < 0 ? 1 : -1);
    } else {
      const rot = rots[current % rots.length];
      activeCard.style.transition = 'transform 0.35s cubic-bezier(0.22,1,0.36,1)';
      activeCard.style.transform  = `translate(-50%,-50%) rotate(${rot}deg)`;
    }
  }, { passive:true });

  /* Film grain canvas */
  (function(){
    const c = document.getElementById('grain');
    c.style.cssText = 'position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0.07;';
    const ctx = c.getContext('2d');
    function resize(){ c.width=innerWidth; c.height=innerHeight; }
    resize(); window.addEventListener('resize', resize);
    function draw(){
      const id = ctx.createImageData(c.width, c.height);
      const d  = id.data;
      for(let i=0;i<d.length;i+=4){
        const v=Math.random()*255|0;
        d[i]=d[i+1]=d[i+2]=v; d[i+3]=255;
      }
      ctx.putImageData(id,0,0);
      requestAnimationFrame(draw);
    }
    draw();
  })();

  /* Dust particles */
  (function(){
    const c = document.getElementById('dust');
    for(let i=0;i<22;i++){
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = [
        `left:${Math.random()*100}%`,
        `width:${Math.random()<0.5?1:2}px`,
        `height:${Math.random()<0.5?1:2}px`,
        `animation-duration:${9+Math.random()*16}s`,
        `animation-delay:${-Math.random()*20}s`,
        `opacity:${0.15+Math.random()*0.4}`,
      ].join(';');
      c.appendChild(p);
    }
  })();
</script>
</body>
</html>
