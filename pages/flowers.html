<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flowers 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *,*::after,*::before { padding:0; margin:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    :root { --dark-color: #000; }

    html, body {
      width:100%; height:100%;
      background-color: var(--dark-color);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-family: 'Lato', sans-serif;
      color: white;
    }

    /* ── BACK BUTTON ── */
    .back-btn {
      position: fixed; top: max(16px, env(safe-area-inset-top)); left: 16px;
      z-index: 200;
      background: rgba(0,0,0,0.5); border: 1.5px solid rgba(255,255,255,0.2);
      color: white; font-family: 'Lato', sans-serif; font-size: 14px;
      padding: 10px 18px; border-radius: 20px; cursor: pointer;
      backdrop-filter: blur(4px); display:flex; align-items:center; gap:6px;
      transition: all 0.2s; user-select:none;
    }
    .back-btn:active { transform: scale(0.95); }

    /* ── FLOWER SCENE ── */
    .flower-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      perspective: 1000px;
    }

    .night {
      position: fixed; left:50%; top:0;
      transform: translateX(-50%);
      width:100%; height:100%;
      filter: blur(0.1vmin);
      background-image:
        radial-gradient(ellipse at top, transparent 0%, var(--dark-color)),
        radial-gradient(ellipse at bottom, var(--dark-color), rgba(167,139,250,0.2)),
        repeating-linear-gradient(220deg, rgb(0,0,0) 0px, rgb(0,0,0) 19px, transparent 19px, transparent 22px),
        repeating-linear-gradient(189deg, rgb(0,0,0) 0px, rgb(0,0,0) 19px, transparent 19px, transparent 22px),
        repeating-linear-gradient(148deg, rgb(0,0,0) 0px, rgb(0,0,0) 19px, transparent 19px, transparent 22px),
        linear-gradient(90deg, rgb(88,28,135), rgb(216,180,254));
    }

    .flowers {
      position: absolute;
      bottom: 0;
      transform: scale(1.4);
      transform-origin: bottom center;
    }

    .flower {
      position: absolute; bottom: 10vmin;
      transform-origin: bottom center;
      z-index: 10;
      --fl-speed: 0.3s;
    }
    .flower--1 { animation: moving-flower-1 4s linear infinite; }
    .flower--1 .flower__line { height:70vmin; animation-delay:0.3s; }
    .flower--1 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.6s backwards; }
    .flower--1 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.4s backwards; }
    .flower--1 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 1.2s backwards; }
    .flower--1 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 1.0s backwards; }
    .flower--1 .flower__line__leaf--5 { animation: blooming-leaf-right var(--fl-speed) 1.8s backwards; }
    .flower--1 .flower__line__leaf--6 { animation: blooming-leaf-left  var(--fl-speed) 2.0s backwards; }

    .flower--2 { left:50%; transform:rotate(20deg); animation: moving-flower-2 4s linear infinite; }
    .flower--2 .flower__line { height:60vmin; animation-delay:0.6s; }
    .flower--2 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 1.9s backwards; }
    .flower--2 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 1.7s backwards; }
    .flower--2 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 1.5s backwards; }
    .flower--2 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 1.3s backwards; }

    .flower--3 { left:50%; transform:rotate(-15deg); animation: moving-flower-3 4s linear infinite; }
    .flower--3 .flower__line { animation-delay:0.9s; }
    .flower--3 .flower__line__leaf--1 { animation: blooming-leaf-right var(--fl-speed) 2.5s backwards; }
    .flower--3 .flower__line__leaf--2 { animation: blooming-leaf-right var(--fl-speed) 2.3s backwards; }
    .flower--3 .flower__line__leaf--3 { animation: blooming-leaf-left  var(--fl-speed) 2.1s backwards; }
    .flower--3 .flower__line__leaf--4 { animation: blooming-leaf-left  var(--fl-speed) 1.9s backwards; }

    .flower__leafs { position:relative; animation: blooming-flower 2s backwards; }
    .flower__leafs--1 { animation-delay:1.1s; }
    .flower__leafs--2 { animation-delay:1.4s; }
    .flower__leafs--3 { animation-delay:1.7s; }
    .flower__leafs::after {
      content:""; position:absolute; left:0; top:0;
      transform:translate(-50%,-100%);
      width:8vmin; height:8vmin;
      background-color:#d8b4fe; filter:blur(10vmin);
    }

    .flower__leaf {
      position:absolute; bottom:0; left:50%;
      width:8vmin; height:11vmin;
      border-radius:51% 49% 47% 53%/44% 45% 55% 69%;
      background-color:#9b59b6;
      background-image:linear-gradient(to top,#8e44ad,#8e44ad);
      transform-origin:bottom center;
      opacity:0.9;
      box-shadow:inset 0 0 2vmin rgba(255,255,255,0.5);
    }
    .flower__leaf--1 { transform:translate(-10%,1%) rotateY(40deg) rotateX(-50deg); }
    .flower__leaf--2 { transform:translate(-50%,-4%) rotateX(40deg); }
    .flower__leaf--3 { transform:translate(-90%,0%) rotateY(45deg) rotateX(50deg); }
    .flower__leaf--4 {
      width:8vmin; height:8vmin; transform-origin:bottom left;
      border-radius:4vmin 10vmin 4vmin 4vmin;
      transform:translate(0%,18%) rotateX(70deg) rotate(-43deg);
      background-image:linear-gradient(to top,#8e44ad,#8e44ad);
      z-index:1; opacity:0.8;
    }

    .flower__white-circle {
      position:absolute; left:-3.5vmin; top:-3vmin;
      width:9vmin; height:4vmin; border-radius:50%;
      background-color:#fff;
    }
    .flower__white-circle::after {
      content:""; position:absolute; left:50%; top:45%;
      transform:translate(-50%,-50%);
      width:60%; height:60%; border-radius:inherit;
      background-image:
        repeating-linear-gradient(135deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
        repeating-linear-gradient(45deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 12px),
        linear-gradient(90deg,rgb(127,47,21),rgb(255,206,0));
    }

    .flower__line {
      height:55vmin; width:1.5vmin;
      background-image:linear-gradient(to left,rgba(0,0,0,0.2),transparent,rgba(255,255,255,0.2)),linear-gradient(to top,transparent 10%,#583e08,#944415);
      box-shadow:inset 0 0 2px rgba(0,0,0,0.5);
      animation:grow-flower-tree 4s backwards;
    }
    .flower__line__leaf {
      --w:7vmin; --h:calc(var(--w) + 2vmin);
      position:absolute; top:20%; left:90%;
      width:var(--w); height:var(--h);
      border-top-right-radius:var(--h); border-bottom-left-radius:var(--h);
      background-image:linear-gradient(to top,rgba(20,117,122,0.4),#095721);
    }
    .flower__line__leaf--1 { transform:rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--2 { top:45%; transform:rotate(70deg) rotateY(30deg); }
    .flower__line__leaf--3,.flower__line__leaf--4,.flower__line__leaf--6 {
      border-top-right-radius:0; border-bottom-left-radius:0;
      border-top-left-radius:var(--h); border-bottom-right-radius:var(--h);
      left:-460%; top:12%; transform:rotate(-70deg) rotateY(30deg);
    }
    .flower__line__leaf--4 { top:40%; }
    .flower__line__leaf--5 { top:0; transform-origin:left; transform:rotate(70deg) rotateY(30deg) scale(0.6); }
    .flower__line__leaf--6 { top:-2%; left:-450%; transform-origin:right; transform:rotate(-70deg) rotateY(30deg) scale(0.6); }

    .flower__light {
      position:absolute; bottom:0; width:1vmin; height:1vmin;
      background-color:#e0aaff; border-radius:50%; filter:blur(0.2vmin);
      animation:light-ans 4s linear infinite backwards;
    }
    .flower__light:nth-child(odd) { background-color:#c084fc; }
    .flower__light--1 { left:-2vmin; animation-delay:1s; }
    .flower__light--2 { left:3vmin;  animation-delay:0.5s; }
    .flower__light--3 { left:-6vmin; animation-delay:0.3s; }
    .flower__light--4 { left:6vmin;  animation-delay:0.9s; }
    .flower__light--5 { left:-1vmin; animation-delay:1.5s; }
    .flower__light--6 { left:-4vmin; animation-delay:3s; }
    .flower__light--7 { left:3vmin;  animation-delay:2s; }
    .flower__light--8 { left:-6vmin; animation-delay:3.5s; }

    .flower__grass {
      --c:#04661f; --line-w:1.5vmin;
      position:absolute; bottom:12vmin; left:-7vmin;
      display:flex; flex-direction:column; align-items:flex-end;
      z-index:20; transform-origin:bottom center;
      transform:rotate(-48deg) rotateY(40deg);
    }
    .flower__grass--1 { animation:moving-grass 2s linear infinite; }
    .flower__grass--2 {
      left:2vmin; bottom:10vmin;
      transform:scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
      opacity:0.8; z-index:0;
      animation:moving-grass--2 1.5s linear infinite;
    }
    .flower__grass--top {
      width:7vmin; height:10vmin;
      border-top-right-radius:100%; border-right:var(--line-w) solid var(--c);
      transform-origin:bottom center; transform:rotate(-2deg);
    }
    .flower__grass--bottom {
      margin-top:-2px; width:var(--line-w); height:25vmin;
      background-image:linear-gradient(to top,transparent,var(--c));
    }
    .flower__grass__leaf {
      --size:10vmin;
      position:absolute;
      width:calc(var(--size)*2.1); height:var(--size);
      border-top-left-radius:var(--size); border-top-right-radius:var(--size);
      background-image:linear-gradient(to top,transparent,transparent 30%,var(--c));
      z-index:100;
    }
    .flower__grass__leaf--1 { top:-6%;  left:30%;   --size:6vmin;  transform:rotate(-20deg); animation:growing-grass-ans--1 2s 2.6s backwards; }
    .flower__grass__leaf--2 { top:-5%;  left:-110%; --size:6vmin;  transform:rotate(10deg);  animation:growing-grass-ans--2 2s 2.4s linear backwards; }
    .flower__grass__leaf--3 { top:5%;   left:60%;   --size:8vmin;  transform:rotate(-18deg) rotateX(-20deg); animation:growing-grass-ans--3 2s 2.2s linear backwards; }
    .flower__grass__leaf--4 { top:6%;   left:-135%; --size:8vmin;  transform:rotate(2deg);   animation:growing-grass-ans--4 2s 2s linear backwards; }
    .flower__grass__leaf--5 { top:20%;  left:60%;   --size:10vmin; transform:rotate(-24deg) rotateX(-20deg); animation:growing-grass-ans--5 2s 1.8s linear backwards; }
    .flower__grass__leaf--6 { top:22%;  left:-180%; --size:10vmin; transform:rotate(10deg);  animation:growing-grass-ans--6 2s 1.6s linear backwards; }
    .flower__grass__leaf--7 { top:39%;  left:70%;   --size:10vmin; transform:rotate(-10deg); animation:growing-grass-ans--7 2s 1.4s linear backwards; }
    .flower__grass__leaf--8 { top:40%;  left:-215%; --size:11vmin; transform:rotate(10deg);  animation:growing-grass-ans--8 2s 1.2s linear backwards; }
    .flower__grass__overlay {
      position:absolute; top:-10%; right:0; width:100%; height:100%;
      background-color:rgba(0,0,0,0.6); filter:blur(1.5vmin); z-index:100;
    }

    .flower__g-long {
      --w:2vmin; --h:6vmin; --c:#0e5b3c;
      position:absolute; bottom:10vmin; left:-3vmin;
      transform-origin:bottom center;
      transform:rotate(-30deg) rotateY(-20deg);
      display:flex; flex-direction:column; align-items:flex-end;
      animation:flower-g-long-ans 3s linear infinite;
    }
    .flower__g-long__top {
      top:calc(var(--h)*-1); width:calc(var(--w)+1vmin); height:var(--h);
      border-top-right-radius:100%; border-right:0.7vmin solid var(--c);
      transform:translate(-0.7vmin,1vmin);
    }
    .flower__g-long__bottom {
      width:var(--w); height:50vmin; transform-origin:bottom center;
      background-image:linear-gradient(to top,transparent 30%,var(--c));
      box-shadow:inset 0 0 2px rgba(0,0,0,0.5);
      clip-path:polygon(35% 0,65% 1%,100% 100%,0% 100%);
    }

    .flower__g-right {
      position:absolute; bottom:6vmin; left:-2vmin;
      transform-origin:bottom left; transform:rotate(20deg);
    }
    .flower__g-right .leaf {
      width:30vmin; height:50vmin;
      border-top-left-radius:100%; border-left:2vmin solid #217005;
      background-image:linear-gradient(to bottom,transparent,var(--dark-color) 60%);
      -webkit-mask-image:linear-gradient(to top,transparent 30%,#24803e 60%);
    }
    .flower__g-right--1 { animation:flower-g-right-ans 2.5s linear infinite; }
    .flower__g-right--2 { left:5vmin; transform:rotateY(-180deg); animation:flower-g-right-ans--2 3s linear infinite; }
    .flower__g-right--2 .leaf { height:75vmin; filter:blur(0.3vmin); opacity:0.8; }

    .flower__g-front {
      position:absolute; bottom:6vmin; left:2.5vmin;
      z-index:100; transform-origin:bottom center;
      transform:rotate(-28deg) rotateY(30deg) scale(1.04);
      animation:flower__g-front-ans 2s linear infinite;
    }
    .flower__g-front__line {
      width:0.3vmin; height:20vmin;
      background-image:linear-gradient(to top,transparent,#042e0b,transparent 100%);
      position:relative;
    }
    .flower__g-front__leaf-wrapper {
      position:absolute; top:0; left:0;
      transform-origin:bottom left; transform:rotate(10deg);
    }
    .flower__g-front__leaf-wrapper:nth-child(even) { left:0; transform:rotateY(-180deg) rotate(5deg); animation:flower__g-front__leaf-left-ans 1s ease-in backwards; }
    .flower__g-front__leaf-wrapper:nth-child(odd)  { animation:flower__g-front__leaf-ans 1s ease-in backwards; }
    .flower__g-front__leaf-wrapper--1 { top:-8vmin; transform:scale(0.7); animation:flower__g-front__leaf-ans 1s 5.5s ease-in backwards !important; }
    .flower__g-front__leaf-wrapper--2 { top:-8vmin; transform:rotateY(-180deg) scale(0.7) !important; animation:flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important; }
    .flower__g-front__leaf-wrapper--3 { top:-3vmin; animation:flower__g-front__leaf-ans 1s 4.6s ease-in backwards; }
    .flower__g-front__leaf-wrapper--4 { top:-3vmin; transform:rotateY(-180deg) scale(0.9) !important; animation:flower__g-front__leaf-left-ans-2 1s 4.6s ease-in backwards !important; }
    .flower__g-front__leaf-wrapper--5,.flower__g-front__leaf-wrapper--6 { top:2vmin; }
    .flower__g-front__leaf-wrapper--7,.flower__g-front__leaf-wrapper--8 { top:6.5vmin; }
    .flower__g-front__leaf-wrapper--2 { animation-delay:5.2s !important; }
    .flower__g-front__leaf-wrapper--3 { animation-delay:4.9s !important; }
    .flower__g-front__leaf-wrapper--5 { animation-delay:4.3s !important; }
    .flower__g-front__leaf-wrapper--6 { animation-delay:4.1s !important; }
    .flower__g-front__leaf-wrapper--7 { animation-delay:3.8s !important; }
    .flower__g-front__leaf-wrapper--8 { animation-delay:3.5s !important; }
    .flower__g-front__leaf {
      width:10vmin; height:10vmin;
      border-radius:100% 0% 0% 100%/100% 100% 0% 0%;
      box-shadow:inset 0 2px 1vmin hsla(184deg,97%,58%,0.2);
      background-image:linear-gradient(to bottom left,transparent,var(--dark-color)),linear-gradient(to bottom right,#064f0a 50%,transparent 50%);
      -webkit-mask-image:linear-gradient(to bottom right,#097149 50%,transparent 50%);
      mask-image:linear-gradient(to bottom right,#0e8723 50%,transparent 50%);
    }

    .flower__g-fr {
      position:absolute; bottom:-4vmin; left:0;
      transform-origin:bottom left; z-index:10;
      animation:flower__g-fr-ans 2s linear infinite;
    }
    .flower__g-fr .leaf {
      width:30vmin; height:50vmin;
      border-top-left-radius:100%; border-left:2vmin solid #147b47;
      -webkit-mask-image:linear-gradient(to top,transparent 25%,#0e4e2a 50%);
      position:relative; z-index:1;
    }
    .flower__g-fr__leaf {
      position:absolute; top:0; left:0; width:10vmin; height:10vmin;
      border-radius:100% 0% 0% 100%/100% 100% 0% 0%;
      box-shadow:inset 0 2px 1vmin hsla(184deg,97%,58%,0.2);
      background-image:linear-gradient(to bottom left,transparent,var(--dark-color) 98%),linear-gradient(to bottom right,#106e18 45%,transparent 50%);
      -webkit-mask-image:linear-gradient(135deg,#175f22 40%,transparent 50%);
    }
    .flower__g-fr__leaf--1 { left:20vmin; transform:rotate(45deg);  animation:flower__g-fr-leaft-ans-1 0.5s 5.2s linear backwards; }
    .flower__g-fr__leaf--2 { left:12vmin; top:-7vmin; transform:rotate(25deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-6 0.5s 5s linear backwards; }
    .flower__g-fr__leaf--3 { left:15vmin; top:6vmin;  transform:rotate(55deg); animation:flower__g-fr-leaft-ans-5 0.5s 4.8s linear backwards; }
    .flower__g-fr__leaf--4 { left:6vmin;  top:-2vmin; transform:rotate(25deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-6 0.5s 4.6s linear backwards; }
    .flower__g-fr__leaf--5 { left:10vmin; top:14vmin; transform:rotate(55deg); animation:flower__g-fr-leaft-ans-5 0.5s 4.4s linear backwards; }
    .flower__g-fr__leaf--6 { left:0;      top:6vmin;  transform:rotate(25deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-6 0.5s 4.2s linear backwards; }
    .flower__g-fr__leaf--7 { left:5vmin;  top:22vmin; transform:rotate(45deg); animation:flower__g-fr-leaft-ans-7 0.5s 4s linear backwards; }
    .flower__g-fr__leaf--8 { left:-4vmin; top:15vmin; transform:rotate(15deg) rotateY(-180deg); animation:flower__g-fr-leaft-ans-8 0.5s 3.8s linear backwards; }

    .long-g {
      position:absolute; bottom:25vmin; left:-42vmin;
      transform-origin:bottom left;
    }
    .long-g--1 { bottom:0; transform:scale(0.8) rotate(-5deg); }
    .long-g--1 .leaf { -webkit-mask-image:linear-gradient(to top,transparent 40%,#196d2a 80%) !important; }
    .long-g--1 .leaf--1 { --w:5vmin; --h:60vmin; left:-2vmin; transform:rotate(3deg) rotateY(-180deg); }
    .long-g--2,.long-g--3 { bottom:-3vmin; left:-35vmin; transform-origin:center; transform:scale(0.6) rotateX(60deg); }
    .long-g--2 .leaf,.long-g--3 .leaf { -webkit-mask-image:linear-gradient(to top,transparent 50%,#176220 80%) !important; }
    .long-g--2 .leaf--1,.long-g--3 .leaf--1 { left:-1vmin; transform:rotateY(-180deg); }
    .long-g--3 { left:-17vmin; bottom:0; }
    .long-g--3 .leaf { -webkit-mask-image:linear-gradient(to top,transparent 40%,#176220 80%) !important; }
    .long-g--4 { left:25vmin; bottom:-3vmin; transform-origin:center; transform:scale(0.6) rotateX(60deg); }
    .long-g--4 .leaf { -webkit-mask-image:linear-gradient(to top,transparent 50%,#176220 80%) !important; }
    .long-g--5 { left:42vmin; bottom:0; transform:scale(0.8) rotate(2deg); }
    .long-g--6 { left:0; bottom:-20vmin; z-index:100; filter:blur(0.3vmin); transform:scale(0.8) rotate(2deg); }
    .long-g--7 { left:35vmin; bottom:20vmin; z-index:-1; filter:blur(0.3vmin); transform:scale(0.6) rotate(2deg); opacity:0.7; }
    .long-g .leaf {
      --w:15vmin; --h:40vmin; --c:#1aaa15;
      position:absolute; bottom:0;
      width:var(--w); height:var(--h);
      border-top-left-radius:100%; border-left:2vmin solid var(--c);
      -webkit-mask-image:linear-gradient(to top,transparent 20%,var(--dark-color));
      transform-origin:bottom center;
    }
    .long-g .leaf--0 { left:2vmin;  animation:leaf-ans-1 4s linear infinite; }
    .long-g .leaf--1 { --w:5vmin; --h:60vmin; animation:leaf-ans-1 4s linear infinite; }
    .long-g .leaf--2 { --w:10vmin; --h:40vmin; left:-0.5vmin; bottom:5vmin; transform-origin:bottom left; transform:rotateY(-180deg); animation:leaf-ans-2 3s linear infinite; }
    .long-g .leaf--3 { --w:5vmin; --h:30vmin; left:-1vmin; bottom:3.2vmin; transform-origin:bottom left; transform:rotate(-10deg) rotateY(-180deg); animation:leaf-ans-3 3s linear infinite; }

    .grow-ans { animation:grow-ans 2s var(--d) backwards; }
    .growing-grass { animation:growing-grass-ans 1s 2s backwards; }

    /* ── MESSAGE ── */
    .flower-message {
      position: fixed; bottom:0; left:0; right:0; z-index:60;
      text-align:center;
      padding: 20px 24px max(20px, env(safe-area-inset-bottom));
      background:linear-gradient(0deg,rgba(0,0,0,0.95) 0%,rgba(0,0,0,0.7) 60%,transparent 100%);
      opacity:0; transform:translateY(16px);
      transition:opacity 0.8s ease,transform 0.8s ease;
    }
    .flower-message.visible { opacity:1; transform:translateY(0); }
    .flower-message h1 {
      font-family:'Dancing Script',cursive; font-size:30px; font-weight:700;
      color:#d7a8f0; text-shadow:0 0 20px rgba(167,139,250,0.5); margin-bottom:10px;
    }
    .flower-message p {
      font-size:15px; line-height:1.75; color:rgba(255,255,255,0.78);
      max-width:340px; margin:0 auto 8px;
    }
    .flower-message .signature {
      font-family:'Dancing Script',cursive; font-size:22px;
      color:#c084fc; margin-top:14px;
    }

    /* ── KEYFRAMES ── */
    @keyframes moving-flower-1 { 0%,100%{transform:rotate(2deg)}  50%{transform:rotate(-2deg)} }
    @keyframes moving-flower-2 { 0%,100%{transform:rotate(18deg)} 50%{transform:rotate(14deg)} }
    @keyframes moving-flower-3 { 0%,100%{transform:rotate(-18deg)} 50%{transform:rotate(-20deg) rotateY(-10deg)} }

    @keyframes growing-grass-ans--8 { 0%{transform-origin:bottom right; transform:rotate(10deg) scale(0)} }

    /* ── SHOOTING STARS CANVAS ── */
    #starCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 48%;
      z-index: 30;
      pointer-events: none;
    }
    .star-tap-zone {
      position: fixed;
      z-index: 35;
      border-radius: 50%;
      cursor: pointer;
      background: rgba(192,132,252,0.15);
      border: 1.5px solid rgba(192,132,252,0.4);
      transform: translate(-50%, -50%);
      width: 70px; height: 70px;
      display: none;
      pointer-events: auto;
    }

    /* ── STAR COUNTER ── */
    .star-counter {
      position: fixed;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(192,132,252,0.4);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      backdrop-filter: blur(6px);
      letter-spacing: 1px;
      white-space: nowrap;
      transition: all 0.4s;
    }
    .star-counter.all-caught {
      border-color: #c084fc;
      color: #e9d5ff;
      box-shadow: 0 0 14px rgba(192,132,252,0.6);
    }

    /* ── MODAL ── */
    .star-modal-overlay {
      position: fixed; inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .star-modal-overlay.show { opacity: 1; pointer-events: auto; }
    .star-modal {
      background: linear-gradient(145deg, #1a0a2e, #120820);
      border: 1.5px solid rgba(192,132,252,0.5);
      border-radius: 26px;
      padding: 36px 28px 28px;
      max-width: 300px; width: 88%;
      text-align: center;
      transform: scale(0.75) translateY(24px);
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 0 50px rgba(139,92,246,0.35), 0 24px 60px rgba(0,0,0,0.6);
      position: relative; overflow: hidden;
    }
    .star-modal-overlay.show .star-modal { transform: scale(1) translateY(0); }
    .star-modal::before {
      content:'';
      position:absolute; inset:0;
      background: radial-gradient(ellipse at top, rgba(192,132,252,0.08), transparent 70%);
      pointer-events:none;
    }

    .modal-flower-icon {
      font-size: 56px;
      display: block;
      margin-bottom: 14px;
      animation: iconBounce 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes iconBounce {
      0%   { transform: scale(0) rotate(-25deg); opacity:0; }
      100% { transform: scale(1) rotate(0deg);   opacity:1; }
    }
    .modal-star-label {
      font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(192,132,252,0.7);
      margin-bottom: 6px;
    }
    .modal-flower-name {
      font-family: 'Dancing Script', cursive;
      font-size: 26px; font-weight: 700;
      color: #e9d5ff;
      margin-bottom: 12px;
      text-shadow: 0 0 20px rgba(192,132,252,0.4);
    }
    .modal-message {
      font-size: 14px; line-height: 1.8;
      color: rgba(255,255,255,0.75);
      margin-bottom: 22px;
    }
    .modal-close {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none; color: white;
      font-family: 'Lato', sans-serif;
      font-size: 13px; font-weight: 700;
      padding: 10px 30px; border-radius: 20px;
      cursor: pointer; letter-spacing: 0.8px;
      box-shadow: 0 4px 18px rgba(124,58,237,0.45);
      transition: transform 0.15s;
    }
    .modal-close:active { transform: scale(0.94); }

    /* orbiting sparkles around icon */
    .orbit-ring {
      position: absolute;
      top: 30px; left: 50%;
      transform: translateX(-50%);
      width: 80px; height: 80px;
      pointer-events: none;
    }
    .orbit-ring span {
      position: absolute; top: 50%; left: 50%;
      width: 7px; height: 7px; border-radius: 50%;
      animation: orbitSpin 2.4s linear infinite;
    }
    .orbit-ring span:nth-child(1){ background:#c084fc; animation-delay:0s;    --a:0deg; }
    .orbit-ring span:nth-child(2){ background:#e9d5ff; animation-delay:0.8s;  --a:120deg; }
    .orbit-ring span:nth-child(3){ background:#a78bfa; animation-delay:1.6s;  --a:240deg; }
    @keyframes orbitSpin {
      0%   { transform:translate(-50%,-50%) rotate(var(--a)) translateX(38px) scale(1);   opacity:1; }
      50%  { transform:translate(-50%,-50%) rotate(calc(var(--a)+180deg)) translateX(38px) scale(0.4); opacity:0.3; }
      100% { transform:translate(-50%,-50%) rotate(calc(var(--a)+360deg)) translateX(38px) scale(1);   opacity:1; }
    }

    /* all-caught glow burst */
    @keyframes burstGlow {
      0%   { box-shadow: 0 0 0 0 rgba(192,132,252,0.7); }
      100% { box-shadow: 0 0 0 40px rgba(192,132,252,0); }
    }
    .burst { animation: burstGlow 0.8s ease-out forwards; }
  </style>
</head>

    let caught = 0;
    let activeStarIdx = -1;
    let stars = [];         // live star objects on canvas
    let availableIdx = [0,1,2,3,4]; // which flowers not yet shown
    let modalOpen = false;
    const TOTAL = 5;

    // ── CANVAS SETUP ──────────────────────────────────
    const canvas  = document.getElementById('starCanvas');
    const ctx     = canvas.getContext('2d');
    const tapZone = document.getElementById('tapZone');
    const counter = document.getElementById('starCounter');

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight * 0.48;
    }

    // ── STAR CLASS ────────────────────────────────────
    let starDirection = 0; // alternates 0=L→R, 1=R→L
    class ShootingStar {
      constructor(flowerIdx) {
        this.flowerIdx = flowerIdx;
        this.flower    = FLOWERS[flowerIdx];
        this.dir       = starDirection % 2; // 0=left-to-right, 1=right-to-left
        starDirection++;
        this.reset();
        this.alive     = true;
        this.caught    = false;
        this.tapShown  = false;
      }
      reset() {
        const ang = (18 + Math.random() * 22) * Math.PI / 180;
        const spd = 3.5 + Math.random() * 2.5;

        if (this.dir === 0) {
          // left → right: start from left edge
          this.x  = -20;
          this.y  = canvas.height * (0.08 + Math.random() * 0.45);
          this.vx =  Math.cos(ang) * spd;
          this.vy =  Math.sin(ang) * spd;
        } else {
          // right → left: start from right edge
          this.x  = canvas.width + 20;
          this.y  = canvas.height * (0.08 + Math.random() * 0.45);
          this.vx = -Math.cos(ang) * spd;
          this.vy =  Math.sin(ang) * spd;
        }

        this.trail    = [];
        this.maxTrail = 28;
        this.size     = 4 + Math.random() * 3;
        this.alpha    = 1;
        this.life     = 0;
        this.maxLife  = 100 + Math.random() * 40;
        this.tapAt    = Math.floor(this.maxLife * 0.38);
        this.tapShown = false;
      }
      update() {
        if (!this.alive) return;
        this.life++;
        this.x += this.vx;
        this.y += this.vy;
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > this.maxTrail) this.trail.shift();

        // show tap zone as soon as star appears
        if (this.life === 1 && !this.tapShown) {
          this.tapShown = true;
          showTapZone(this);
        }

        // fade near end
        if (this.life > this.maxLife * 0.7) {
          this.alpha = 1 - (this.life - this.maxLife * 0.7) / (this.maxLife * 0.3);
        }

        if (this.life >= this.maxLife) {
          this.alive = false;
          hideTapZone();
        }
      }
      draw() {
        if (!this.alive) return;
        // trail
        for (let i = 0; i < this.trail.length; i++) {
          const t = i / this.trail.length;
          ctx.beginPath();
          ctx.arc(this.trail[i].x, this.trail[i].y, this.size * t * 0.7, 0, Math.PI * 2);
          ctx.fillStyle = this.flower.trail;
          ctx.globalAlpha = t * this.alpha * 0.6;
          ctx.fill();
        }
        // head glow
        ctx.globalAlpha = this.alpha;
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2.5);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.3, this.flower.color);
        grad.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        // core
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 0.7, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    // ── TAP ZONE ─────────────────────────────────────
    function showTapZone(star) {
      activeStarIdx = stars.indexOf(star);
      tapZone.style.display = 'block';
      tapZone.style.left = star.x + 'px';
      tapZone.style.top  = star.y + 'px';
    }
    function hideTapZone() {
      tapZone.style.display = 'none';
      activeStarIdx = -1;
    }

    tapZone.addEventListener('click', catchStar);
    tapZone.addEventListener('touchstart', catchStar, { passive: true });

    // Fallback: tap anywhere on canvas area to catch nearby star
    function handleCanvasTap(e) {
      if (modalOpen || activeStarIdx < 0) return;
      const star = stars[activeStarIdx];
      if (!star || !star.alive) return;
      const touch = e.touches ? e.touches[0] : e;
      const rect = canvas.getBoundingClientRect();
      const tx = touch.clientX - rect.left;
      const ty = touch.clientY - rect.top;
      const dist = Math.hypot(tx - star.x, ty - star.y);
      if (dist < 60) catchStar();
    }
    canvas.style.pointerEvents = 'auto';
    canvas.addEventListener('click', handleCanvasTap);
    canvas.addEventListener('touchstart', handleCanvasTap, { passive: true });

    function catchStar() {
      if (modalOpen || activeStarIdx < 0) return;
      const star = stars[activeStarIdx];
      if (!star || !star.alive) return;

      star.alive  = false;
      star.caught = true;
      hideTapZone();

      // burst effect at star position
      spawnBurst(star.x, star.y, star.flower.trail);

      // open modal
      const f = star.flower;
      document.getElementById('modalIcon').textContent = f.icon;
      document.getElementById('modalName').textContent = f.name;
      document.getElementById('modalMsg').textContent  = f.message;
      // tint orbit ring
      document.querySelectorAll('.orbit-ring span').forEach(s => s.style.background = f.trail);

      caught++;
      updateCounter();
      openModal();
    }

    // ── BURST PARTICLES ───────────────────────────────
    const burstParticles = [];
    function spawnBurst(x, y, color) {
      for (let i = 0; i < 14; i++) {
        const ang = Math.random() * Math.PI * 2;
        const spd = 2 + Math.random() * 4;
        burstParticles.push({
          x, y,
          vx: Math.cos(ang) * spd,
          vy: Math.sin(ang) * spd,
          alpha: 1,
          r: 2 + Math.random() * 3,
          color
        });
      }
    }
    function updateBurst() {
      for (let i = burstParticles.length - 1; i >= 0; i--) {
        const p = burstParticles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.08;
        p.alpha -= 0.03;
        if (p.alpha <= 0) { burstParticles.splice(i, 1); continue; }
        ctx.globalAlpha = p.alpha;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ── COUNTER ───────────────────────────────────────
    function updateCounter() {
      if (caught >= TOTAL) {
        counter.textContent = '✦ all stars caught ✦ 5 / 5';
        counter.classList.add('all-caught');
        setTimeout(celebrateAll, 500);
      } else {
        counter.textContent = `✦ catch the stars   ${caught} / ${TOTAL}`;
      }
    }

    function celebrateAll() {
      document.getElementById('flowerScene').classList.add('burst');
      spawnBurst(canvas.width / 2, canvas.height / 2, '#c084fc');
      spawnBurst(canvas.width * 0.25, canvas.height * 0.3, '#e9d5ff');
      spawnBurst(canvas.width * 0.75, canvas.height * 0.3, '#a78bfa');
    }

    // ── MODAL ─────────────────────────────────────────
    function openModal() {
      modalOpen = true;
      document.getElementById('starModal').classList.add('show');
      // re-trigger icon animation
      const icon = document.getElementById('modalIcon');
      icon.style.animation = 'none';
      void icon.offsetWidth;
      icon.style.animation = '';
    }
    function closeModal() {
      document.getElementById('starModal').classList.remove('show');
      modalOpen = false;
    }
    window.closeModal = closeModal;

    // ── SPAWN SCHEDULE ────────────────────────────────
    let spawnQueue = [...availableIdx];
    // shuffle
    spawnQueue.sort(() => Math.random() - 0.5);

    function spawnNext() {
      if (spawnQueue.length === 0) return;
      const idx = spawnQueue.shift();
      const star = new ShootingStar(idx);
      stars.push(star);
      // schedule next
      if (spawnQueue.length > 0) {
        setTimeout(spawnNext, 4000 + Math.random() * 3000);
      }
    }

    // ── AMBIENT TWINKLES (background stars) ───────────
    const twinkles = Array.from({ length: 40 }, () => ({
      x: Math.random() * 400,
      y: Math.random() * 300,
      r: 0.5 + Math.random() * 1.2,
      alpha: Math.random(),
      speed: 0.005 + Math.random() * 0.015,
      dir: Math.random() > 0.5 ? 1 : -1
    }));
    function drawTwinkles() {
      twinkles.forEach(t => {
        t.alpha += t.speed * t.dir;
        if (t.alpha >= 1 || t.alpha <= 0) t.dir *= -1;
        ctx.globalAlpha = t.alpha * 0.6;
        ctx.beginPath();
        ctx.arc(
          t.x * canvas.width / 400,
          t.y * canvas.height / 300,
          t.r, 0, Math.PI * 2
        );
        ctx.fillStyle = '#e9d5ff';
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // ── MAIN LOOP ─────────────────────────────────────
    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawTwinkles();
      stars.forEach(s => { s.update(); s.draw(); });
      updateBurst();
      // keep tap zone glued to active star every frame
      if (activeStarIdx >= 0 && stars[activeStarIdx]?.alive) {
        const s = stars[activeStarIdx];
        tapZone.style.left = s.x + 'px';
        tapZone.style.top  = s.y + 'px';
      } else if (activeStarIdx >= 0) {
        hideTapZone();
      }
      requestAnimationFrame(loop);
    }

    // ── INIT ──────────────────────────────────────────
    window.onload = () => {
      document.body.classList.remove('container');
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      loop();
      // first star after 2s, then chain
      setTimeout(spawnNext, 2000);
      // flower message
      setTimeout(() => {
        document.getElementById('flowerMsg').classList.add('visible');
      }, 2200);
    };

    function goBack() {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage('close-gift', '*');
      } else {
        window.history.back();
      }
    }
  </script>
</body>
</html>
