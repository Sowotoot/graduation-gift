<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>A Graduation Gift 🎓</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/room.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- MUSIC TOGGLE -->
  <button class="music-btn" id="musicBtn" aria-label="Toggle music">
    <span class="music-icon">♪</span>
  </button>

  <!-- DARK OVERLAY -->
  <div class="darkness" id="darkness"></div>

  <!-- ROOM SCENE -->
  <div class="room" id="room">

    <!-- BACKGROUND IMAGE -->
    <img src="assets/images/room.png" class="room-bg" alt="Room" draggable="false">

    <!-- =====================================================
         INVISIBLE HOTSPOT BUTTONS — positioned over each
         object in the room.png image.
         Adjust top/left/width/height % to match your image.
         ===================================================== -->

    <!-- LAMP (power button area — bottom-left of lamp base) -->
    <button
      class="hotspot"
      id="lampHotspot"
      aria-label="Turn on lamp"
      style="left:2%; top:52%; width:18%; height:22%;"
    >
      <!-- visible only in debug mode -->
      <span class="hotspot-label">Lamp</span>
    </button>

    <!-- FLOWER BOUQUET (left of desk) -->
    <button
      class="hotspot gift-hotspot"
      id="flowersObj"
      data-page="pages/flowers.html"
      data-gift="flowers"
      aria-label="Open flowers"
      style="left:3%; top:55%; width:17%; height:28%;"
    >
      <span class="hotspot-label">Flowers</span>
      <div class="gift-ripple"></div>
    </button>

    <!-- ENVELOPE (center-left of desk) -->
    <button
      class="hotspot gift-hotspot"
      id="envelopeObj"
      data-page="pages/letter.html"
      data-gift="letter"
      aria-label="Open letter"
      style="left:20%; top:72%; width:22%; height:18%;"
    >
      <span class="hotspot-label">Letter</span>
      <div class="gift-ripple"></div>
    </button>

    <!-- PHOTO ALBUM (center of desk) -->
    <button
      class="hotspot gift-hotspot"
      id="albumObj"
      data-page="pages/photos.html"
      data-gift="photos"
      aria-label="Open photo album"
      style="left:30%; top:58%; width:32%; height:30%;"
    >
      <span class="hotspot-label">Album</span>
      <div class="gift-ripple"></div>
    </button>

    <!-- VOICE RECORDER (right of desk) -->
    <button
      class="hotspot gift-hotspot"
      id="voiceObj"
      data-page="pages/voicemail.html"
      data-gift="voicemail"
      aria-label="Open voicemail"
      style="left:74%; top:54%; width:20%; height:34%;"
    >
      <span class="hotspot-label">Voicemail</span>
      <div class="gift-ripple"></div>
    </button>

  </div><!-- end room -->

  <!-- TOUCH HINT -->
  <div class="touch-hint" id="touchHint">
    <div class="touch-anim"></div>
    <p>Tap the objects</p>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-bar-wrap" id="progressWrap">
    <div class="prog-track">
      <div class="prog-fill" id="progFill"></div>
      <div class="prog-steps">
        <div class="prog-step" id="step-flowers" data-gift="flowers">
          <div class="step-dot"><span></span></div>
        </div>
        <div class="prog-step" id="step-letter" data-gift="letter">
          <div class="step-dot"><span></span></div>
        </div>
        <div class="prog-step" id="step-photos" data-gift="photos">
          <div class="step-dot"><span></span></div>
        </div>
        <div class="prog-step" id="step-voicemail" data-gift="voicemail">
          <div class="step-dot"><span></span></div>
        </div>
        <div class="prog-step final-step" id="step-final">
          <div class="step-dot lock-dot"><span>🔒</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- AUDIO -->
  <audio id="bgMusic" loop>
    <source src="assets/audio/bg-music.mp3" type="audio/mpeg">
  </audio>
  <audio id="lampSound">
    <source src="assets/audio/lamp-click.mp3" type="audio/mpeg">
  </audio>
  <audio id="unlockSound">
    <source src="assets/audio/unlock.mp3" type="audio/mpeg">
  </audio>

  <!-- SCRIPTS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/room.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
